# Prometheus 配置 - 顺时后端监控
# 启动: docker-compose -f docker-compose.monitoring.yml up -d

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'shunshi-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
    scrape_interval: 15s
    # 健康检查
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'shunshi-backend'

  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
