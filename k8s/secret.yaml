apiVersion: v1
kind: Secret
metadata:
  name: shunshi-secret
  namespace: shunshi
type: Opaque
# ⚠️ 以下为 base64 编码示例，部署前请替换为实际值
# echo -n 'your_value' | base64
data:
  MYSQL_ROOT_PASSWORD: c2h1bnNoaV9yb290X3B3ZA==   # shunshi_root_pwd
  MYSQL_PASSWORD: c2h1bnNoaTEyMw==                # shunshi123
  JWT_SECRET: Y2hhbmdlX21lX2luX3Byb2R1Y3Rpb24=   # change_me_in_production
  SILICONFLOW_API_KEY: eW91cl9hcGlfa2V5X2hlcmU=   # your_api_key_here
---
