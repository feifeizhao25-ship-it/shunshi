# Web 管理后台 Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-admin
  namespace: shunshi
  labels:
    app: web-admin
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: web-admin
  template:
    metadata:
      labels:
        app: web-admin
    spec:
      containers:
        - name: web-admin
          image: shunshi/web-admin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: web-admin
  namespace: shunshi
  labels:
    app: web-admin
spec:
  type: ClusterIP
  selector:
    app: web-admin
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
