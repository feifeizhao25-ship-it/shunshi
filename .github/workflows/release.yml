name: Release

on:
  push:
    tags:
      - "v*"

env:
  FLUTTER_VERSION: "3.24.0"

jobs:
  # ==================== 构建 Android APK ====================
  build-android-cn:
    name: Build Android CN APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-cn
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-cn-release-apk
          path: android-cn/build/app/outputs/flutter-apk/*.apk

  build-android-global:
    name: Build Android Global APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-global
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-global-release-apk
          path: android-global/build/app/outputs/flutter-apk/*.apk

  # ==================== 构建 iOS ====================
  build-ios-cn:
    name: Build iOS CN
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-cn
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

  build-ios-global:
    name: Build iOS Global
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-global
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

  # ==================== 创建 GitHub Release ====================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android-cn, build-android-global, build-ios-cn, build-ios-global]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android CN APK
        uses: actions/download-artifact@v4
        with:
          name: android-cn-release-apk
          path: ./artifacts/android-cn

      - name: Download Android Global APK
        uses: actions/download-artifact@v4
        with:
          name: android-global-release-apk
          path: ./artifacts/android-global

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^$TAG$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "顺时 ${{ github.ref_name }}"
          body: |
            ## 更新内容
            ${{ steps.changelog.outputs.changelog }}

            ## 下载
            - **Android 国内版**: `android-cn-release-apk`
            - **Android 海外版**: `android-global-release-apk`
            - **iOS**: 需要通过 TestFlight 分发
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            ./artifacts/android-cn/*.apk
            ./artifacts/android-global/*.apk
