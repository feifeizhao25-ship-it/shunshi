name: Polymarket Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Polymarket
        run: |
          curl -s "https://gamma-api.polymarket.com/events?limit=20&active=true&closed=false&order=volume24hr&ascending=false" \
            -H "Accept: application/json" -o events.json
          
          # Count active markets
          python3 -c "
import json
with open('events.json') as f:
    data = json.load(f)
active = [e for e in data if not e.get('closed', True)]
print(f'ACTIVE:{len(active)}')
with open('count.txt', 'w') as f:
    f.write(str(len(active)))
"
      
      - name: Read previous count
        id: prev
        run: |
          if [ -f count.txt ]; then
            echo "prev=$(cat count.txt)" >> \$GITHUB_OUTPUT
          else
            echo "prev=0" >> \$GITHUB_OUTPUT
          fi
          
      - name: Commit if changed
        run: |
          curr=\$(cat count.txt)
          if [ "\$curr" != "\${{ steps.prev.outputs.prev }}" ]; then
            git config user.email "bot@github.com"
            git config user.name "Polymarket Bot"
            git add count.txt events.json
            git commit -m "Polymarket update: \$curr active markets"
            git push
          fi
